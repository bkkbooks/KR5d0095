body:
  text: 永嘉周無所住述玄關一竅頌一竅纔通萬竅通絲毫不動露真空箇中便是真宗祖認著依前又不中真土頌真土從來名强立學人不曉謾傍求若知真土爲中道何必騎牛更覔牛陽晶頌全清絶點號陽晶纔有纖瑕便屬隂多少神仙皆不說誰人肯向此留心玄牝頌萬物芸芸各歸其根識得根源玄牝虚傳龍虎頌龍虎猖狂心念炎烈慧劎纔揮二獸俱滅鉛汞頌欲識鉛汞情性二物二物和合還丹了畢真爐鼎頌頭上頂天脚下踏地中有一物煅成寳器真藥物頌天地之先無根靈草一意制度産成至寳斤兩頌不圓不缺行中道著意忘懷便落偏更言二八一斤數開眼明明被孰瞞抽添頌若問抽添法縱擒怕覺遲調停無損益方始證無爲識得真心無不徧自己不明被物轉可憐無限守株人退鉛進汞錯方便火候頌真火本無候時人休强猜要知端的意無去亦無來法度頌清淨藥材宻意爲丸十二時中無念火煎口訣頌意到心誠湛然若凝晝夜無間效驗自應沐浴頌沐浴無他術休尋卯酉中困眠饑喫飯無日不春風工夫頌百刻工夫一刻推一刻還同十二時十二時中歸一念念中無念始真竒温養頌恬淡無思慮虚無任自然胎圓神自化我命不由天或問或問金丹直指既明道要但十六頌皆言性宗語於命學恐或不然答曰金丹諭本性長存是名金剛不壞即悟眞篇金丹妙色之身證眞金慈相昔龍女頓悟心珠廼此法也學者罕明本性向外馳求說龍話虎便爲命學無爲之道便爲談空噫何見之偏是未知盡性以至於命也性即命命即性空劫之先性命混然無名無字纔墮語言便分爲兩但靜極不能不動動則天命流行動極復靜天命之性歸根依然空劫之體無所虧欠動靜循環曷有止息是知出於命者謂之性歸於性者謂之命性命同出而異名也安得性外求命命外求性者乎若不明動靜之機便指性命爲二事一言之又是錯認紫陽張眞人云性命之道未備則運心不普紫清白真人云若曉金剛圓覺二經則金丹之義自明何必分别老釋之異同也或問老釋之教既同而儒教同否答曰教雖分三道則一也學者根器不等聞見淺深各宗其宗互相是非皆失其本殊不知一身本具三教儒指兩教爲異端則自昧本真豈知無始以來含一統而無遺哉故三教皆可入道特患不得其門而入有能透徹釋老豈謂孔聖異哉且以儒教言之自堯傳之舜舜傳之禹禹傳之湯文武周公湯文武周公傳之孔孟皆心傳之妙釋教自世尊傳之迦葉迦葉傳之阿難亦以心印心道教自東華帝君傳之金闕帝君金闕帝君傳之西王母西王母皆以口口相傳若明眼者未舉先知已落第二義更從事於頰舌轉没交涉矣心傳之學不外乎中之一字書曰允執瘚中合論曰令衆生住於中道道德經云不如守中可謂天下無二道莊子曰通於一萬事畢紫陽張真人云得一萬事畢是也或問三教而一矣吾聞道教有形神俱妙或身外有身儒釋有否答曰釋教亦有之且如達磨隻履西歸布袋和尚身外有身普化振錫飛空智者空榻赴供仰山見異僧騰空而去豈非同一脉耶儒教則不然蓋爲人道之主扶三綱正五常廼有爲之教實無爲之道道同而教不同也或問儒與釋老道同而教不同釋參禪道修養又安得釋與道同敢再請其說答曰天下無二道聖人無兩心子未明心地故發此問參禪則制心一處始掃至於無掃禪是佛心心爲萬法之宗修養爲抱元守一初修至於無修道爲養神神爲萬物之主神即心心即道道即禪也蓋無爲大道者離名相無生死常處虚空無有纖碍事來則應事去則寂如鑑照相不留形迹强名曰道學者至此疑爲談空寂遂望風而退殊不知談空者非空非空即真空眞空故名曰一一廼大道之祖金丹之母生靈之本老子云抱一爲天下式然無爲之法不可便執爲實故金剛經云一切賢聖皆以無爲法而有差殊非具眼者孰可語也或問釋老儒道同之說已備得其㫖矣但玄關一竅玄牝之門或以心腎爲竅口鼻爲門或曰非心非腎非口非鼻不知何者爲是答曰心腎口鼻之說先輩誘人入道又恐不明斯義妄認肉塊孔竅昧本來真空命脉故曰非心腎口鼻以掃執泥其實玄關一竅玄牝之門皆謂人念頭起滅處老子云玄牝之門是謂天地根紫清白眞人云念頭動處是玄牝倘能親識得起滅處即知虚無之谷造化之母非惟金丹藥物火候等類皆從此出至於諸子百家一大藏經教工巧伎藝盡在其中矣紫陽張真人云此一竅亦無邊傍更無内外紫清白真人云玄關一竅其大無外其小無内杏林石眞人云一竅名玄牝中藏氣與神是也或問玄關玄牝已知端的真土陽晶其義何也答曰土者廼中之異名也得其中者性命混一湛然圓明是謂陽晶紫陽張真人云中央正位産玄珠古云産箇明珠是真土或問真土陽晶已知其意龍虎鉛汞可得聞歟答曰龍虎鉛汞者謂人心念念不停如龍虎之猖狂若鉛汞之難制海蟾劉真人云能乘乾馬奔龍去解使坤牛駕虎歸紫陽張眞人云鉛見火即飛汞見火即走苟得制伏之道自然心中無心念中無念所謂降龍伏虎擒鉛制汞也或問龍虎鉛汞備知其義爐鼎藥物其義云何答曰爐鼎以身譬之藥物以心中之寳喻之身外無心心外無寳豈離此心而求藥物捨此身而覔鼎爐所以道不遠人而人自遠耳桓真人云心天本是六虚乾身是坤兮兩厮牽紫清白真人云心中自有無限藥材身中自有無限火符紫陽張真人云心屬乾身屬坤故曰乾坤鼎器然則然矣此亦是誘學者反身克己達本歸元之說苟能一念未萌包含造化豈非真爐鼎耶外應諸縁内心無惴豈非真藥材也或問鼎爐藥物已知其詳火候法度斤兩抽添不知何義答曰火候法度等說皆爲偏於動靜不得其中故有此喻若能動靜相忘不靜中靜不動中動所謂隂陽處中眞土會合神仙之道畢矣紫陽張真人云火之燥水之濫不可不調和故有斤兩法度先輩云不增不減不抽不添是也又問火候法度已無可疑工夫口訣其義何也答曰工夫之說譬如琴瑟箜篌雖有妙音不得妙指終莫能發況金丹者乎若得正傳片言之下便可用功隨有應驗不用年中取月月中取日日中取時時中取刻亦不用子午卯酉支干屯蒙卦氣等說但於行住坐卧清淨鈐鍵陽氣自生紫陽張真人云修鍊至此泥丸風生絳宫月明丹田火熾泥丸陳眞人云初時夾脊關脉開其次膀胱如火然内中兩腎如湯煎時乎跳動冲心源又有一簇百脉之語所謂工夫效驗然清淨鈐鍵之要即杏林石真人云豈知丹妙訣終日翫真空泥丸陳真人云當初聖祖留丹訣無中生有作丹基心印經云存無守有老子云守靜篤所謂口訣真趣先聖後聖同一舌頭共一鼻孔然則然矣猶涉異路更須不墮語言千聖不同途太上老君未著經群仙未形口訣以前昆蟲草木果熟脫體尚能示變化之妙抑亦口授況人爲物靈者乎學者當具是眼又問工夫口訣固已曉矣未知沐浴温養何義答曰沐浴廼清淨之義温養謂中之義捨之益濫操之益燥出操捨之外者曰温養心清淨則塵不染致諸中則道無爲無爲而無不爲矣杏林石眞人云温養無他術無中養就兒或問十六頌已得其要所謂結胎脫體之說不知果有否答曰結胎脫體譬超凡入聖之意但能心不附物神歸氣復所謂换結聖胎也抱養月深神全氣化所謂脫體也古云順之則凡逆之則聖虚靖天師云神若出便收來神返身中氣自回如此朝朝與暮暮自然赤子産真胎本來子云神在身則生神去身則死紫清白真人云身外有身爲脫體楞嚴經云形神出胎親爲佛子其心離身去住自由是也紫陽張真人云丹是色身妙寳法身即是真心從來無色亦無音一體不須兩認或問結胎脫體之說固已曉矣不知幾日可成𣲪諸書所說或一日或三日或百日或一年九載或片餉或不在三年九載此心尚疑答曰年月之說先輩與後學分量有利鈍工夫有淺深故有久近之分實不過發明攢簇之機天之一寒一暑人之一晝一夜息之一出一入也一刻之工夫自有一年之節候一年三萬六千之刻可奪三萬六千之數是謂握隂陽之樞機盜天地之造化只在當人一念中耳心志堅確工夫純一時節若至其理自彰靈源曹真人云堅心一志向前修成與不成無必取又豈專於限量耶但能清靜無爲湛然若存何慮不形神俱妙與道合真哉與道合真則金丹假名耳玄關玄牝真土陽晶龍虎鉛汞爐鼎藥物斤兩火候抽添法度工夫口訣沐浴温養衆妙之說不可有心求不可無心得不著有不著無孔子借世尊口說共老子耳聞聞非聞說非說一顆金丹色非色當場拈出與君看通身是口吞不得或問金丹之說深而不可求求而不可得如群仙歌詩契論皆隱秘幽微不可直指其義今先生所指過直無乃大淺乎予曰不然昔神仙欲人自求其道故寓淺於深而人不知今予欲人皆知其道故寓深於淺而人易求如孔子性與天道雖高弟不可得聞至於孟子語告子則明白洞達老子謂之微妙玄通似難求也然又曰吾道甚易知甚易行亦未嘗大深也世尊謂幽固深遠無人能到亦似乎深也然直指人心見性成佛又何深哉子所謂指過直無廼大淺豈其然乎金丹直指
