front:
  text: 金丹真指序夫八余著金丹十六頌直言性命之奥故以直指言之且明心見性宗門事也歸根復命玄門事也宗玄異事若不可比而同之然玄謂之鍊丹宗謂之牧牛抑以大樸既散非鍊之則無以返漓還淳六窗既開非牧之則無以澡黑露白曰鍊曰牧殊途同歸曰玄曰宗一而二二而一者也余自幼學時與世異好慕道既切訪師益廣淳祐壬寅年遇赤城林君自然以丹法授余又拉余拜其師李眞人片言之間盡得金火返還之要且謂若悟性而後爲之尤當也余廼徧走叢林請益諸老繼聞宗陽碧虚方先生得紫陽張真人之傳己酉仲春挾直指訪之足始跨門心已相照是歲季夏有僧圓燦自莆田過余舉狗子話相契因覽寳臺和尚千歲碑至服鉛汞句執其義曰鉛汞何物也曰情性也何也可服歟曰以中道也中者何曰空不空動非動也圓燦笑曰予聞有二事圓修者其謂是歟雖然成丹之難非賴鉅有力者不能也次歲暮春吴長者葺竹浦白雲菴爲余二人地行之半月工夫顯發取紫陽張真人金丹序泥丸陳真人翠虚吟印之節節符驗予益自信直指所言不妄或謂予曰道之不明久矣子自信可也而以著書求信於人恐秪益其紛紛耳余應之曰信者近於知不信者近於不知也古人所謂道不屬知不屬不知知是妄覺不知是無記明眼底人試一展卷淳祐庚戌六月中澣日永嘉周無所住序金丹直指
  hash: sha256:4339855e3084aa92eda905aad7691279b235232e92fe3e86fdd2502958c66144
